<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Our Second Date Nishh ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{
height:100vh;overflow:hidden;display:flex;justify-content:center;align-items:center;
background:linear-gradient(-45deg,#ff758c,#ff7eb3,#ffd194,#ff9a9e);
background-size:400% 400%;animation:bg 12s ease infinite;
}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.heart{position:fixed;font-size:22px;animation:float linear forwards;opacity:.8;pointer-events:none}
@keyframes float{from{transform:translateY(100vh) scale(.6)}to{transform:translateY(-120px) scale(1.3);opacity:0}}
.card{
width:min(92vw,430px);
background:rgba(255,255,255,.18);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.35);
border-radius:24px;padding:30px;text-align:center;
box-shadow:0 20px 45px rgba(0,0,0,.2);color:#fff;
animation:pop .6s;
}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
h1,h2{margin-bottom:15px}
p{line-height:1.6;margin-bottom:20px}
button{
border:none;border-radius:40px;padding:14px 28px;margin:8px;
cursor:pointer;font-size:17px;font-weight:bold;
background:#fff;color:#ff4d6d;transition:.25s;
box-shadow:0 8px 20px rgba(0,0,0,.15)}
button:hover{transform:translateY(-3px) scale(1.05)}
.primary{background:#ff4d6d;color:#fff}
#no{position:absolute}
.step{display:none}
.active{display:block}
input{width:100%;padding:12px;border:none;border-radius:12px;margin:10px 0 18px;font-size:16px}
label{display:block;text-align:left;margin-top:6px}
#confetti{position:fixed;inset:0;pointer-events:none}
.conf{position:absolute;width:8px;height:12px;animation:fall 3s linear forwards}
@keyframes fall{to{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>
<body>
<div id="confetti"></div>
<div class="card">
<div id="s1" class="step active">
<h1>💌 Hey Beautiful ❤️</h1>
<p>Every moment with you makes me smile.<br><br>I have something special to ask you...</p>
<button class="primary" onclick="next(2)">Open My Heart 💖</button>
</div>

<div id="s2" class="step">
<h1>🥹❤️</h1>
<h2>Will You Go On Our First Date?</h2>
<div style="position:relative;height:120px">
<button id="yes" class="primary">YES ❤️</button>
<button id="no">NO 😅</button>
</div>
</div>

<div id="s3" class="step">
<h2>Let's Plan It ❤️</h2>
<label>🍕 Favorite Food</label>
<input id="food" placeholder="Pizza, Pasta, Coffee...">
<label>📍 Place</label>
<input id="place" placeholder="Cafe, Movie, Park...">
<label>📅 Date</label>
<input type="date" id="date">
<button class="primary" onclick="finish()">Confirm ❤️</button>
</div>

<div id="s4" class="step">
<h1>🎉 It's a Date! ❤️</h1>
<div id="summary"></div>
<h2 style="margin-top:20px">I Can't Wait To See You 🥰</h2>
</div>
</div>

<script>
function next(n){
document.querySelectorAll(".step").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+n).classList.add("active");
}
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML=Math.random()>.5?"❤️":"💕";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(5+Math.random()*4)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),9000);
},300);

const no = document.getElementById("no");
const yes = document.getElementById("yes");

let escapeCount = 0;

function moveButton() {

    const padding = 20;

    const maxX = window.innerWidth - no.offsetWidth - padding;
    const maxY = window.innerHeight - no.offsetHeight - padding;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    no.style.position = "fixed";
    no.style.left = randomX + "px";
    no.style.top = randomY + "px";
    no.style.transition = "all .25s ease";

    // Make YES button slightly bigger every time
    escapeCount++;
    yes.style.transform = `scale(${1 + escapeCount * 0.08})`;
}

// Desktop
no.addEventListener("mouseenter", moveButton);

// Mobile
no.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moveButton();
});

// If someone somehow clicks it
no.addEventListener("click", (e) => {
    e.preventDefault();
    moveButton();
});

document.getElementById("yes").onclick=()=>{
confetti();
next(3);
};

function confetti(){
const c=document.getElementById("confetti");
for(let i=0;i<120;i++){
let d=document.createElement("div");
d.className="conf";
d.style.left=Math.random()*100+"vw";
d.style.top="-20px";
d.style.background=`hsl(${Math.random()*360},100%,60%)`;
d.style.animationDelay=(Math.random()*0.8)+"s";
    
c.appendChild(d);
setTimeout(()=>d.remove(),3500);
}
}
function finish(){
let f=food.value.trim(),p=place.value.trim(),d=date.value;
if(!f||!p||!d){alert("Please fill all details ❤️");return;}
let target=new Date(d);
let diff=Math.ceil((target-new Date())/86400000);
let msg=`<p><b>🍕 Food:</b> ${f}</p>
<p><b>📍 Place:</b> ${p}</p>
<p><b>📅 Date:</b> ${d}</p>`;
if(diff>=0) msg+=`<p>⏳ Only <b>${diff}</b> day(s) left! ❤️</p>`;
msg+=`<p style="margin-top:20px">Thank you for saying <b>YES</b>.<br>I promise to make it a beautiful memory together. 💖</p>`;
summary.innerHTML=msg;
confetti();
next(4);
}
</script>
</body>
</html>
