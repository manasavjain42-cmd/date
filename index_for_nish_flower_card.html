<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You, Nish ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI,sans-serif}
body{
overflow:hidden;height:100vh;display:flex;justify-content:center;align-items:center;
background:linear-gradient(-45deg,#fff5f7,#ffe8ef,#fff5d8,#fffaf0);
background-size:400% 400%;animation:bg 15s ease infinite;
}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.card{
position:relative;z-index:5;
width:min(90vw,480px);
padding:35px;border-radius:28px;
background:rgba(255,255,255,.35);
backdrop-filter:blur(18px);
box-shadow:0 20px 50px rgba(0,0,0,.15);
text-align:center;color:#8a4b59;
}
h1{font-size:2rem;margin-bottom:10px}
p{font-size:1.05rem;line-height:1.7;margin-bottom:25px}
button{
padding:14px 30px;border:none;border-radius:40px;
background:#ff7aa8;color:#fff;font-size:18px;font-weight:bold;
cursor:pointer;transition:.3s;
box-shadow:0 10px 25px rgba(255,122,168,.35)
}
button:hover{transform:scale(1.08)}
#bouquet{
margin-top:25px;
opacity:0;
transform:scale(.2);
transition:1.2s;
font-size:56px;
}
.show{
opacity:1!important;
transform:scale(1)!important;
animation:swing 3s ease-in-out infinite;
}
@keyframes swing{
0%,100%{transform:scale(1) rotate(-3deg)}
50%{transform:scale(1) rotate(3deg)}
}
#message{
opacity:0;transform:translateY(20px);
transition:1s;
margin-top:18px;
}
#message.show{opacity:1;transform:translateY(0)}
.float,.petal,.heart,.spark{
position:fixed;pointer-events:none;user-select:none
}
.float{animation:up linear forwards}
@keyframes up{
from{transform:translateY(105vh) rotate(0)}
to{transform:translateY(-120px) rotate(360deg);opacity:0}
}
.petal{animation:fall linear forwards}
@keyframes fall{
to{transform:translateY(110vh) rotate(720deg);opacity:0}
}
.heart{animation:heart 5s linear forwards}
@keyframes heart{
from{transform:translateY(100vh) scale(.7)}
to{transform:translateY(-120px) scale(1.4);opacity:0}
}
.spark{animation:blink 2s forwards}
@keyframes blink{
0%{opacity:0;transform:scale(0)}
40%{opacity:1}
100%{opacity:0;transform:scale(2)}
}
.glow{
position:absolute;width:260px;height:260px;border-radius:50%;
background:radial-gradient(rgba(255,214,120,.45),transparent 70%);
left:50%;top:55%;transform:translate(-50%,-50%);
filter:blur(20px);opacity:0;transition:1s;z-index:-1
}
.glow.show{opacity:1}
</style>
</head>
<body>
<div class="card">
<div class="glow" id="glow"></div>
<h1>🌸 A Little Surprise 🌸</h1>
<p>Someone wanted to send you something beautiful...</p>
<button onclick="openGift(this)">🎀 Open Your Bouquet</button>

<div id="bouquet">
💐
<div id="message">
<h2>🌷 This is for you, <span style="color:#e91e63">Nish ❤️</span></h2>
<p>
Just a little bouquet to brighten your day.<br><br>
May your days always bloom with happiness,<br>
smiles, and beautiful moments. 🌸✨
</p>
</div>
</div>
</div>

<script>
const items=["🌸","🌼","🌹","🌺","🪻","🌻"];
setInterval(()=>{
let f=document.createElement("div");
f.className="float";
f.innerHTML=items[Math.floor(Math.random()*items.length)];
f.style.left=Math.random()*100+"vw";
f.style.fontSize=(20+Math.random()*18)+"px";
f.style.animationDuration=(6+Math.random()*4)+"s";
document.body.appendChild(f);
setTimeout(()=>f.remove(),10000);
},350);

function petals(){
for(let i=0;i<180;i++){
let p=document.createElement("div");
p.className="petal";
p.innerHTML=items[Math.floor(Math.random()*items.length)];
p.style.left=Math.random()*100+"vw";
p.style.top="-50px";
p.style.fontSize=(18+Math.random()*20)+"px";
p.style.animationDuration=(3+Math.random()*4)+"s";
p.style.animationDelay=(Math.random()*1.5)+"s";
document.body.appendChild(p);
setTimeout(()=>p.remove(),8000);
}}
function hearts(){
for(let i=0;i<40;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML=Math.random()>.5?"❤️":"💕";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(18+Math.random()*18)+"px";
h.style.animationDelay=(Math.random()*2)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),7000);
}}
function sparkles(){
for(let i=0;i<100;i++){
let s=document.createElement("div");
s.className="spark";
s.innerHTML="✨";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
setTimeout(()=>s.remove(),2000);
}}
function openGift(btn){
btn.style.display="none";
document.getElementById("bouquet").classList.add("show");
document.getElementById("message").classList.add("show");
document.getElementById("glow").classList.add("show");
petals();
hearts();
sparkles();
}
</script>
</body>
</html>
